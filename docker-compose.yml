services:
  mysql:
    image: mysql:8.4
    container_name: github-hub-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: mysql22
      MYSQL_DATABASE: github_projects_hub
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: github-hub-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: mysql://root:mysql22@mysql:3306/github_projects_hub
      JWT_SECRET: ${JWT_SECRET:-production-change-me}
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-production-refresh-change-me}
      JWT_REFRESH_EXPIRES_IN: 30d
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_CALLBACK_URL: ${GITHUB_CALLBACK_URL:-http://localhost:3001/api/v1/auth/github/callback}
      GITHUB_TOKENS: ${GITHUB_TOKENS:-}
      FRONTEND_URL: http://localhost:3000
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: github-hub-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql-data:
